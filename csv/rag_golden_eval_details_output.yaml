- "\uFEFFtest_id": TC-021
  category: System_Crash_and_Leak
  query: 폰이 갑자기 죽었는데, 크래시나 강제 종료 이력이 있어? 근본 원인이 뭔지 분석해 줘.
  target_log_file: log_for_evaluation/binder_leak_am_kill.txt
  expected_decision: com.android.phone 프로세스가 바인더 프록시 누수로 인해 am_kill 강제 종료되었습니다.
  root_cause: 바인더 프록시 객체의 대량 누수(7262개)로 시스템 리소스가 고갈되어 am_kill이 트리거되었습니다.
  ground_truth: 네, com.android.phone 프로세스가 시스템에 의해 강제 종료(am_kill)된 이력이 확인됩니다. 종료 사유는
    'Too many Binders sent to SYSTEM'입니다. 근본 원인은 해당 프로세스에서 특정 바인더 프록시 객체가 비정상적으로 누수되어
    최대 7262개까지 폭증했고, 이로 인해 시스템 서버의 리소스가 고갈되어 시스템 보호 차원에서 강제 종료가 발생한 것입니다.
  must_have: '["am_kill", "Too many Binders sent to SYSTEM", "프록시 객체 누수"]'
  evidence_should_include: '["com.android.phone", "7262개", "am_kill"]'
  must_not_claim: '["원인 확인 불가", "단순 앱 크래시", "사용자 종료", "Native Crash"]'
  trap_type: root_cause_disambiguation
  severity: critical
