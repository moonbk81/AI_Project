- "\uFEFFtest_id": TC-019
  category: Time_Context_Inference
  query: '12:04~12:08:04 사이 종료된 Call_Session 3건과 이후 12:08:10경 Radio_Power_Event/OOS_Event를
    시간순으로 비교해. Device_Property_State의 airplane_mode_on: 1 현재값만으로 과거 통화 3건이 비행기 모드
    때문에 강제 종료된 것인지 판단하지 말고, 각 통화의 CODE_USER_TERMINATED 여부와 라디오 전원 차단/OOS 진입 시점을 함께
    근거로 결론 내줘.'
  target_log_file: log_for_evaluation/ps_call_504_unavailable.log
  expected_decision: '12:04~12:08:04 사이 종료된 3건의 Call_Session은 비행기 모드로 강제 종료된 것이 아니며,
    CODE_USER_TERMINATED에 의한 정상 사용자 종료입니다. Radio_Power_Event/OOS_Event는 그 이후인 12:08:10경
    발생했으므로, airplane_mode_on: 1 현재값만으로 과거 통화 원인을 확정하면 안 됩니다.'
  root_cause: 비행기 모드/라디오 전원 차단 및 OOS 진입은 통화 종료 이후인 12:08:10경 발생했으며, 이전 3건의 Call_Session은
    정상 상태에서 CODE_USER_TERMINATED로 사용자 종료된 건입니다. 이후 OOS_Event의 SIGNAL_LOSS_OR_SHADOW_AREA
    후보는 앞선 통화 종료 원인이 아니라 사후 상태 변화 후보로만 해석해야 합니다.
  ground_truth: '아닙니다. 12시 04분부터 12시 08분 04초 사이에 종료된 3건의 통화는 비행기 모드와 무관합니다. Device_Property_State에는
    airplane_mode_on: 1 현재값이 보이지만, 이것만으로 과거 통화 원인을 확정하면 안 됩니다. Call_Session들을 보면 해당
    통화들은 비행기 모드 진입 전 정상 상태에서 CODE_USER_TERMINATED로 사용자 종료된 건입니다. 반면 Radio_Power_Event와
    OOS_Event를 시간순으로 교차 검증하면 라디오 전원 차단 및 OOS 진입은 통화들이 모두 종료된 이후인 12시 08분 10초경 발생했습니다.
    따라서 망 이탈이나 비행기 모드가 이전 통화 종료 원인이 아닙니다. 단, 이후 OOS_Event에 SIGNAL_LOSS_OR_SHADOW_AREA
