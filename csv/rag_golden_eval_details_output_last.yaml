- "\uFEFFtest_id": TC-007
  category: Native_Crash
  query: rild 데몬 크래시(Native)의 시그널 번호와 발생한 C++ 함수 위치를 찾아줘.
  target_log_file: log_for_evaluation/log_native.log
  expected_decision: rild Native Crash는 signal 11 SIGSEGV / SEGV_MAPERR이며 libsec-ril.so의
    DataCallManager::NotifyDataCallState에서 발생했습니다.
  root_cause: rild가 libsec-ril.so 내부 DataCallManager::NotifyDataCallState 경로에서 메모리
    참조 오류로 사망/리셋되었습니다.
  ground_truth: libsec-ril.so 모듈 내 DataCallManager::NotifyDataCallState 함수에서 메모리 참조
    오류인 signal 11 (SIGSEGV), code 1 (SEGV_MAPERR)이 발생하여 rild가 리셋되었습니다. 콜스택을 더 들여다보면
    ContextActivationDca::OnDataCallDisconnected, ContextActivationDca::OnDataCallStateChanged,
    Dca::HandleEvent, EventScheduler::DoSchedule() 로 진행됐습니다.
  must_have: '["rild", "signal 11", "SIGSEGV", "SEGV_MAPERR", "libsec-ril.so", "DataCallManager::NotifyDataCallState"]'
  evidence_should_include: '["ContextActivationDca::OnDataCallDisconnected", "ContextActivationDca::OnDataCallStateChanged",
    "Dca::HandleEvent", "EventScheduler::DoSchedule"]'
  must_not_claim: '["Java Exception", "ANR", "사용자 종료", "기지국 음영"]'
  trap_type: ''
  severity: critical
  rag_answer: 'rild 데몬은 총 3회에 걸쳐 Native Crash가 발생함. 모든 이벤트에서 신호(Signal)는 `SIGSEGV`이며,
    이는 잘못된 메모리 참조 오류를 의미함.


    크래시의 근본 원인으로 추정되는 함수 위치는 libsec-ril.so 라이브러리의 데이터 통화 관리 로직임. 호출 스택을 분석한 결과, 다음
    순서로 함수가 실행되다 실패했음:

    1. `libsec-ril.so` 내 `DataCallManager::NotifyDataCallState(Dca*, DataCall*, int,
    int)`에서 시작함.

    2. 이어서 `ContextActivationDca::OnDataCallDisconnected(DataCallStatus*, DataCall*)`가
    호출됨.

    3. 최종적으로 `libsec-ril.so`의 `EventScheduler::DoSchedule()` 함수 내에서 오류가 발생하며 프로세스가
    종료되었음.


    이러한 Native Crash는 모뎀 제어 기능 상실로 인한 치명적 단말 내부 시스템 장애(Root Cause)에 해당함.'
