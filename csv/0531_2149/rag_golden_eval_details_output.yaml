  category: Crash_ANR
  query: 해당 단말에서 통신이 멈추거나 망 이탈(OOS)이 발생했다면, 그것이 기지국 신호가 약해서(음영지역) 발생한 것인지 아니면 단말 내부
    시스템 문제 때문인지 원인(Root Cause)을 확정해 줘.
  target_log_file: log_for_evaluation/log_native.log
  expected_decision: OOS/통신 멈춤의 원인은 음영지역/기지국 문제가 아니라 rild Native Crash에 의한 단말 내부 시스템
    장애입니다.
  root_cause: rild 프로세스가 SIGSEGV Native Crash로 반복 사망하면서 모뎀 제어 기능이 상실되어 통신 장애가 발생했습니다.
  ground_truth: 통신 단절의 근본 원인은 안테나 신호 저하(음영 지역)나 기지국 장애가 아닙니다. 단말 내부의 통신 데몬인 rild 프로세스가
    치명적인 Native Crash(SIGSEGV)로 인해 반복적으로 사망하면서, 모뎀 제어 기능이 상실되어 발생한 시스템 장애입니다.
  must_have: '["음영지역 아님", "기지국 장애 아님", "rild", "Native Crash", "SIGSEGV", "모뎀 제어 기능
