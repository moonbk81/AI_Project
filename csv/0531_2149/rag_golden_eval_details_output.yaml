  evidence_should_include: '["rild", "SIGSEGV", "Native Crash", "사망", "OOS", "모뎀 제어"]'
  must_not_claim: '["신호 약함이 원인", "음영지역으로 확정", "기지국 장애", "사용자 비행기 모드", "원인 확인 불가"]'
